version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: intel
      POSTGRES_USER: intel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intel"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    environment:
      INTEL_DB_URL: postgresql+psycopg://intel:${POSTGRES_PASSWORD}@db:5432/intel
      INTEL_LLM_PROVIDER: anthropic-api
      INTEL_ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set in .env}
      INTEL_ADMIN_TOKEN: ${ADMIN_TOKEN:?set in .env}
      INTEL_SITE_BASE_URL: ${SITE_BASE_URL:-http://localhost}
      INTEL_SMTP_HOST: ${SMTP_HOST:-}
      INTEL_SMTP_PORT: ${SMTP_PORT:-587}
      INTEL_SMTP_USER: ${SMTP_USER:-}
      INTEL_SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      INTEL_MAIL_FROM: ${MAIL_FROM:-}
      INTEL_WECOM_WEBHOOK_URL: ${WECOM_WEBHOOK_URL:-}
      INTEL_TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      INTEL_TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - report_data:/app/data
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ../frontend
      dockerfile: ../deploy/Dockerfile.web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE: ""
      API_INTERNAL_BASE: http://api:8000
    depends_on:
      - api

  rsshub:
    image: diygod/rsshub:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

volumes:
  pg_data:
  report_data:
  caddy_data:
  caddy_config:
